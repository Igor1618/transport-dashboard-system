name: Auto Deploy to Production

on:
  push:
    branches:
      - main
      - 'claude/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 195.26.226.37
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Starting deployment..."

            # Создаем директорию для дашборда если её нет
            mkdir -p /var/www/html/dashboard
            cd /var/www/html/dashboard

            # Обновление кода (определяем текущую ветку автоматически)
            BRANCH="${GITHUB_REF#refs/heads/}"
            echo "Deploying branch: $BRANCH to /dashboard"

            # Клонируем или обновляем репозиторий
            if [ ! -d ".git" ]; then
              echo "Клонируем репозиторий..."
              cd /var/www/html
              rm -rf dashboard
              git clone https://github.com/Igor1618/transport-dashboard-system.git dashboard
              cd dashboard
              git checkout "$BRANCH"
            else
              echo "Обновляем репозиторий..."
              git fetch origin
              git checkout "$BRANCH" || git checkout -b "$BRANCH" origin/"$BRANCH"
              git reset --hard origin/"$BRANCH"
              git pull origin "$BRANCH"
            fi

            # Запуск скрипта деплоя
            if [ -f deploy.sh ]; then
              chmod +x deploy.sh
              bash deploy.sh
            else
              echo "⚠️ deploy.sh not found, using basic deployment"
              chown -R www-data:www-data /var/www/html
              systemctl reload nginx
            fi

            echo "✅ Deploy completed at $(date)"
