# Конфигурация nginx для дашборда транспортной компании
# Разместить в: /etc/nginx/sites-available/transport-dashboard
# Создать симлинк: ln -s /etc/nginx/sites-available/transport-dashboard /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name 195.26.226.37 transport-dashboard.local;

    # Корень проекта
    root /var/www/html;
    index index.html;

    # Логи
    access_log /var/log/nginx/transport-dashboard-access.log;
    error_log /var/log/nginx/transport-dashboard-error.log;

    # Основной location для статических файлов
    location / {
        try_files $uri $uri/ =404;

        # CORS для разработки
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
    }

    # PHP обработчик для API и скриптов
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock; # или php7.4-fpm.sock в зависимости от версии
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # API прокси к Supabase REST API (если нужно)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Кэширование статических файлов
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
    }

    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Запрет доступа к служебным файлам
    location ~ \.(env|log|git)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}

